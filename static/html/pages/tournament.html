<section class="tournament">
  <div class="tournament-window">
    <div class="window-title">Tournament</div>
    <div class="tournament-content">
      <!-- Default view -->
      <div class="tournament-default-view">
        <div class="tournament-info">
          <h2>Create / Join a tournament</h2>
          <div id="current-tournament">participate to a fun tournament with 3 of your friends !</div>
        </div>
        <div class="tournament-controls">
          <button id="create-tournament" class="xp-button">Create Tournament</button>
          <button id="join-tournament" class="xp-button">Join Tournament</button>
          <input type="text" id="tournament-id-input" placeholder="Enter Tournament ID" class="xp-button" />
        </div>
      </div>
      
      <!-- Waiting room view (initially hidden) -->
      <div class="tournament-waiting-view" style="display: none;">
        <h2>Tournament Waiting Room</h2>
        <div class="tournament-waiting-container">
          <div class="players-list">
            <h3>Players Joined</h3>
            <ul id="joined-players-list">
              <!-- Players will be listed here dynamically -->
            </ul>
          </div>
          <div id="tournament-status">Waiting for players...</div>
        </div>
        <div class="tournament-controls">
          <button id="start-tournament" class="xp-button" disabled>Start Tournament</button>
          <button id="leave-tournament" class="xp-button">Leave Tournament</button>
        </div>
      </div>
      
      <div class="tournament-bracket" id="tournament-bracket">
        <!-- Bracket will be generated dynamically -->
      </div>
    </div>
  </div>
</section>
